<!-- 
index.html
Has URL parameters to configure model and positions
- model:              3D model filename (default: so-101.glb)
- follower:           Load follower model (0 or 1, default: 1)
- leader:             Load leader model (0 or 1, default: 1)
- followerColor:      Hex color for follower model (default: 0x88ccff)
- leaderColor:        Hex color for leader model (default: 0xffffff)
- followerOpacity:    Opacity for follower model (default: 0.8)
- leaderOpacity:      Opacity for leader model (default: 1.0)
- camX, camY, camZ:   Camera position coordinates (default: 0.0,0.0,0.0)
- camTargetX, camTargetY, camTargetZ: Camera target point (default: 0.0,0.0,0.0)
- wireframe:          Render mode (0 = ghost, 1 = wireframe) (default: 0)
- debug:              Enable debug mode to show console logs in an overlay (0 or 1, default: 0)
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Robot Arm</title>
    <style>
      body { margin: 0; }
      /* background: black; */
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@v0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.182.0/examples/jsm/"
        }
    }
    </script>
    <style>
      canvas {
        cursor: grab;
      }

      canvas.rotating {
        cursor: grabbing;
      }

      canvas.panning {
        cursor: all-scroll;
      }

      canvas.zooming {
        cursor: zoom-in;
      }
    </style>
  </head>
  <body>
    <div id="debug-log" style="display:none; position:fixed; top:0; left:0; width:100vw; max-height:30vh; overflow:auto; background:rgba(0,0,0,0.95); color:#0f0; font-family:monospace; font-size:14px; z-index:2147483647; padding:8px 12px 8px 12px; box-sizing:border-box; border-bottom:2px solid #0f0; pointer-events:none;"></div>
    <script src="js/mqtt/mqtt.min.js"></script>
	  <script src="js/mqtt/jsonrpcovermqtt.js"></script>
    <script type="module">
    import { loadModel, unloadModel, setJointAngles, setRenderMode, setModelColor, setModelTransparency } from '/js/3Dmodels.js';
    import { initCameraControls } from '/js/cameraControls.js';

// Extract parameters from URL and fragment
function getAllParams() {
  const url = new URL(window.location.href);
  // Get query params
  const queryParams = new URLSearchParams(url.search);
  // Get fragment params (after #)
  let hashParams = new URLSearchParams();
  if (window.location.hash && window.location.hash.startsWith('#')) {
    // Remove leading # and possible leading ?
    let hash = window.location.hash.slice(1);
    if (hash.startsWith('?')) hash = hash.slice(1);
    hashParams = new URLSearchParams(hash);
  }
  // Merge: fragment params override query params
  const allParams = new Map();
  for (const [key, value] of queryParams.entries()) {
    allParams.set(key, value);
  }
  for (const [key, value] of hashParams.entries()) {
    allParams.set(key, value);
  }
  return {
    has: (k) => allParams.has(k),
    get: (k) => allParams.get(k)
  };
}

const urlParams = getAllParams();

const camX = urlParams.has('camX') ? parseFloat(urlParams.get('camX')) : 0;
const camY = urlParams.has('camY') ? parseFloat(urlParams.get('camY')) : 0;
const camZ = urlParams.has('camZ') ? parseFloat(urlParams.get('camZ')) : 0;

const camTargetX = urlParams.has('camTargetX') ? parseFloat(urlParams.get('camTargetX')) : 0;
const camTargetY = urlParams.has('camTargetY') ? parseFloat(urlParams.get('camTargetY')) : 0;
const camTargetZ = urlParams.has('camTargetZ') ? parseFloat(urlParams.get('camTargetZ')) : 0;

// Camera position/target from URL
const cameraIsSetViaUrl =
  urlParams.has('camX') ||
  urlParams.has('camY') ||
  urlParams.has('camZ') ||
  urlParams.has('camTargetX') ||
  urlParams.has('camTargetY') ||
  urlParams.has('camTargetZ');

// New parameters for model control
const loadFollower = !urlParams.has('follower') || urlParams.get('follower') === '1' || urlParams.get('follower') === 'true';
const loadLeader = !urlParams.has('leader') || urlParams.get('leader') === '1' || urlParams.get('leader') === 'true';

function parseHexColor(val, fallback) {
  if (!val) return fallback;
  if (typeof val === 'string' && val.startsWith('0x')) return parseInt(val, 16);
  if (typeof val === 'string' && val.startsWith('#')) return parseInt(val.slice(1), 16);
  const n = Number(val);
  return isNaN(n) ? fallback : n;
}

const followerColor = parseHexColor(urlParams.get('followerColor'), 0x88ccff);
const leaderColor = parseHexColor(urlParams.get('leaderColor'), 0xffffff);
const followerOpacity = urlParams.has('followerOpacity') ? parseFloat(urlParams.get('followerOpacity')) : 0.8;
const leaderOpacity = urlParams.has('leaderOpacity') ? parseFloat(urlParams.get('leaderOpacity')) : 1.0;

// Debug flag from URL
const debugMode = urlParams.has('debug') && (urlParams.get('debug') === '1' || urlParams.get('debug') === 'true');
if (debugMode) {
  const debugDiv = document.getElementById('debug-log');
  debugDiv.style.display = 'block';
  // Patch console.log, console.warn, console.error
  ["log", "warn", "error"].forEach(fn => {
    const orig = console[fn];
    console[fn] = function(...args) {
      orig.apply(console, args);
      const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 1) : String(a)).join(' ');
      const color = fn === 'error' ? '#f44' : (fn === 'warn' ? '#ff0' : '#0f0');
      const span = document.createElement('div');
      span.style.color = color;
      span.textContent = `[${fn}] ${msg}`;
      debugDiv.appendChild(span);
      debugDiv.scrollTop = debugDiv.scrollHeight;
    };
  });
  // Test log to confirm debug panel is working
  console.log('Debug mode enabled: console logs will appear here.');
}

// Model name (base name without extension)
let modelName = 'so-101'; // default
if (urlParams.has('model')) {
  modelName = urlParams.get('model');
  // Strip .glb extension if provided
  if (modelName.endsWith('.glb')) {
    modelName = modelName.slice(0, -4);
  }
}

// Render mode: wireframe or ghost
const renderModeParam = urlParams.get('wireframe') || 0;

// Apply settings
setRenderMode(renderModeParam == 1);

// Load models as per parameters
const modelPath = './models/' + modelName;
const loadPromises = [];
if (loadFollower) loadPromises.push(loadModel(modelPath, 'follower'));
else loadPromises.push(Promise.resolve(false));
if (loadLeader) loadPromises.push(loadModel(modelPath, 'leader'));
else loadPromises.push(Promise.resolve(false));

Promise.all(loadPromises).then(([followerLoaded, leaderLoaded]) => {
  if (!followerLoaded && !leaderLoaded) {
    console.warn('Both models failed to load, skipping MQTT initialization');
    return;
  }

  // Set different colors and opacities for each model (customizable via URL)
  if (followerLoaded) {
    console.log('Follower model '+ modelName +' loaded successfully');
    setModelColor('follower', 0xff0000); // Start with red to indicate waiting for data
    setModelTransparency('follower', followerOpacity);
  }
  if (leaderLoaded) {
    console.log('Leader model '+ modelName +' loaded successfully');
    setModelColor('leader', 0xff0000); // Start with red to indicate waiting for data
    setModelTransparency('leader', leaderOpacity);
  }

  const urlObj = new URL(window.location.href);
  const jsonRpcService = new JsonRpcService('ws://' + urlObj.hostname + ':9000', 'watchman_robotarm/' + modelName +"/#");

  const cameraController = initCameraControls({
    jsonRpcService,
    modelName,
    initialCameraPosition: { x: camX, y: camY, z: camZ },
    initialTarget: { x: camTargetX, y: camTargetY, z: camTargetZ }
  });

  let followerIsRed = true;
  let leaderIsRed = true;
  let lastFollowerTimestamp = null;
  let lastLeaderTimestamp = null;

  // Handle inbound method calls (server -> client)
  jsonRpcService.onMethodCalled = function(topic, message) {
    const method = message.method;
    if (method === "finger") {
      jsonRpcService.sendMessage('watchman_robotarm', {
        jsonrpc: "2.0",
        id: message.id,
        result: jsonRpcService.clientId
      });
    } else if (method === "set_follower_joint_angles" && leaderLoaded) {
      console.log('Received follower joint angles message:', message);
      const joints = message.params?.joints || {};
      console.log('Received leader joint angles:', joints);
      const timestamp = Date.parse(message.timestamp);
      lastLeaderTimestamp = timestamp;
      setJointAngles(joints, 'leader');
      return;
    } else if (method === "set_actual_joint_angles" && followerLoaded) {
      const joints = message.params?.joints || {};
      const timestamp = message.timestamp;
      lastFollowerTimestamp = timestamp;
      setJointAngles(joints, 'follower');
      return;
    } else if (method === "change-camera") {
      console.log('Received camera update message:', message);
      if (cameraIsSetViaUrl) {
        console.log('Camera is set via URL; ignoring remote change-camera updates');
        return;
      }
      const params = message.params || {};
      if (params.clientId && params.clientId === jsonRpcService.clientId) {
        console.log('Received camera update from self, ignoring');
        return;
      }
      cameraController.applyRemoteCamera(params);
      return;
    }
  };

  // Expose functions globally for easy access from browser console
  window.robotControl = {
    loadFollower: () => loadModel(modelPath, 'follower'),
    loadLeader: () => loadModel(modelPath, 'leader'),
    unloadFollower: () => unloadModel('follower'),
    unloadLeader: () => unloadModel('leader'),
    setFollowerColor: (color) => setModelColor('follower', color),
    setLeaderColor: (color) => setModelColor('leader', color),
    setFollowerTransparency: (opacity) => setModelTransparency('follower', opacity),
    setLeaderTransparency: (opacity) => setModelTransparency('leader', opacity),
    setFollowerJointAngles: (joints) => setJointAngles(joints, 'follower'),
    setLeaderJointAngles: (joints) => setJointAngles(joints, 'leader')
  };
  console.log('Robot control functions available at window.robotControl');

  // Periodically check if last message is older than 5 seconds and update color
  setInterval(() => {
    const now = Date.now();
    // Follower
    if (followerLoaded) {
      if (lastFollowerTimestamp && (now - lastFollowerTimestamp*1000 > 5000)) {
        if (!followerIsRed) {
          console.log('Follower data is stale, changing color to red');
          setModelColor('follower', 0xff0000);
          followerIsRed = true;
        }
      } else if (followerIsRed) {
        setModelColor('follower', followerColor);
        followerIsRed = false;
      }
    }
    // Leader
    if (leaderLoaded) {
      if (lastLeaderTimestamp && (now - lastLeaderTimestamp > 5000)) {
        if (!leaderIsRed) {
          console.log('Leader data is stale, changing color to red');
          setModelColor('leader', 0xff0000);
          leaderIsRed = true;
        }
      } else if (leaderIsRed) {
        setModelColor('leader', leaderColor);
        leaderIsRed = false;
      }
    }
  }, 1000);
});
    </script>
  </body>
</html>
